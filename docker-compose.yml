services:
  app:
    build: .
    ports:
      - "7860:7860" # Mapowanie portu: zewnętrzny:wewnętrzny
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGO_URL=mongodb://mongodb:27017/pychess
      - REDIS_URL=redis://redis:6379

  mongodb:
    image: mongo:latest
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine

volumes:
  mongo_data:
